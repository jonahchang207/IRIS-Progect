name: iris_gui
description: IRIS — Intelligent Robotic Identification and Sorting — Desktop Control UI
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  web_socket_channel: ^3.0.1
  dio: ^5.4.3

  # Charts
  fl_chart: ^0.68.0

  # Window management (desktop)
  window_manager: ^0.3.9

  # Data models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Utils
  logger: ^2.3.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  riverpod_generator: ^2.4.3
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
